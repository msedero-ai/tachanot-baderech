exports.handler = async (event) => {
  if (event.httpMethod === 'OPTIONS') {
    return {
      statusCode: 200,
      headers: {
        'Access-Control-Allow-Origin': '*',
        'Access-Control-Allow-Headers': 'Content-Type',
        'Access-Control-Allow-Methods': 'POST, OPTIONS'
      },
      body: ''
    };
  }

  try {
    const { url, extraDesc } = JSON.parse(event.body);

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': process.env.ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `אתה מסייע לאפליקציית טיולים ישראלית לזהות מקומות.

${extraDesc ? 'טקסט מהמשתמש: ' + extraDesc : ''}
${url ? 'URL: ' + url : ''}

חוקים:
1. אם יש טקסט — זהה את המקום ממנו בעיקר
2. NEVER תחזיר name:"לא זוהה" — תמיד נסה לזהות
3. אם אין מידע — המצא מקום סביר בישראל עם confidence נמוך
4. קטגוריות: hike=טיול, coffee=קפה, food=מסעדה, view=תצפית, beach=חוף, art=אמנות

החזר JSON בלבד:
{"name":"שם המקום","category":"food","location":"עיר בישראל","description":"תיאור","lat":32.0,"lng":34.9,"confidence":80,"emoji":"🍽"}`
        }]
      })
    });

    const data = await response.json();
    const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    const result = JSON.parse(text.replace(/```json|```/g, '').trim());

    return {
      statusCode: 200,
      headers: {
        'Access-Control-Allow-Origin': '*',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ ok: true, result })
    };
  } catch (e) {
    return {
      statusCode: 200,
      headers: { 'Access-Control-Allow-Origin': '*', 'Content-Type': 'application/json' },
      body: JSON.stringify({ ok: false, error: e.message })
    };
  }
};
